# Docker Compose for Multi-Node Deployment
version: '3.8'

services:
  # Load Balancer
  frontier_lb:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - hadron_core_alpha
      - hadron_core_beta
    networks:
      - civic_mesh

  # Backend Node A
  hadron_core_alpha:
    build: .
    environment:
      - SESSION_SECRET=${SESSION_SECRET}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - civic_mesh

  # Backend Node B
  hadron_core_beta:
    build: .
    environment:
      - SESSION_SECRET=${SESSION_SECRET}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - civic_mesh

networks:
  civic_mesh:
    driver: bridge

