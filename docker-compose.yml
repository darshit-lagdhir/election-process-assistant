# Sovereign Compose for Hadron Core
version: '3.8'

services:
  hadron-core:
    build: .
    image: hadron-core:9.0.0
    container_name: hadron_citadel
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/kernel/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  default:
    name: hadron-network
