services:
  - type: web
    name: hadron-core-citadel
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: PORT
        value: 10000
      - key: GOOGLE_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: METABOLIC_FLOOR_MB
        value: "10.0"
    healthCheckPath: /kernel/health
    numInstances: 1
    disk:
      name: hadron-data-substrate
      mountPath: /data
      sizeGB: 1
