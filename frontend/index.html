<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadron | Sovereign Intelligence</title>
    <link rel="stylesheet" href="/static/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="hadron-viewport">
        <header id="core-header">
            <div class="core-identity">
                <h1>Hadron</h1>
            </div>
            <div class="system-status">
                <span id="status-text">Neural Link Active</span>
                <span id="active-model">Conduit: Auto-Switching</span>
            </div>
        </header>

        <main id="neural-stream">
            <div class="thought-bubble hadron">
                <span class="role-tag">Hadron Core</span>
                <div class="bubble-content">I am the Hadron Core, your Sovereign Election Intelligence. How can I assist you with the election process today?</div>
                <div class="meta-info">
                    <span class="grounding-tag">Verified Source</span>
                </div>
            </div>
        </main>

        <div id="interaction-layer">
            <div id="quick-orbs">
                <div class="orb" data-query="How do I register to vote?">Registration</div>
                <div class="orb" data-query="Who are the main candidates?">Candidates</div>
                <div class="orb" data-query="Latest election results?">Results</div>
                <div class="orb" data-query="Electoral security?">Security</div>
            </div>

            <div id="thought-trace">
                <span>Neural Grounding in Progress...</span>
            </div>
            
            <form id="command-form">
                <div id="command-bar">
                    <input type="text" id="citizen-input" placeholder="Ask a question about elections..." autocomplete="off">
                    <button type="submit" id="execute-btn" class="action-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
