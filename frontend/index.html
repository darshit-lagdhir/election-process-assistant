<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Assistant</title>
    <meta name="description" content="A professional civic intelligence assistant for election process guidance.">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="chat-theme">
    <div id="app-wrapper">
        <header id="main-header">
            <div class="header-content">
                <div class="logo">
                    <div class="status-indicator"></div>
                    <h1>Election Assistant</h1>
                    <span class="v-tag">v6.0</span>
                </div>
                <div id="connection-status">Connecting...</div>
            </div>
        </header>

        <main id="chat-container">
            <div id="messages-list">
                <div class="message ai greeting">
                    <div class="message-content">
                        Hello. I am your Election Process Assistant. How can I assist you with the election process today?
                    </div>
                </div>
            </div>
        </main>

        <footer id="input-section">
            <div class="input-wrapper">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="Type your question here..." autocomplete="off">
                    <button type="submit" id="send-btn">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>
            </div>
            <p class="disclaimer">Powered by Hadron Core Engine. All responses are verified.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
