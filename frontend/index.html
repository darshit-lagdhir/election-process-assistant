<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Process Assistant | Ocular Aperture</title>
    <meta name="description" content="A quantum-secure, agentic civic instrument for election process guidance. Built on the Hadron Core.">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="radiant-theme">
    <div id="app-root">
        <!-- SECTOR DELTA: THE TELEMETRY SHIELD -->
        <header id="top-nav">
            <div class="brand">
                <div class="status-dot"></div>
                <h1>HADRON CORE <span class="version">v1.0.0</span></h1>
            </div>
            <div id="telemetry-shield">
                <!-- Hydrated by app.js -->
                <div class="metric">LAT: --ms</div>
                <div class="metric">RAD: --%</div>
                <div class="metric">CPU: --%</div>
                <div class="metric">MEM: --MB</div>
            </div>
            <div id="status-text">Status: STABLE</div>
        </header>

        <main id="main-interface">
            <!-- SECTOR ZETA: THE ASYNCHRONOUS DATA CONDUIT -->
            <aside id="sidebar">
                <div class="section-title">SYSTEM TIMELINE</div>
                <div id="timeline-conduit">
                    <!-- Hydrated by app.js -->
                </div>
                <div class="sidebar-footer">
                    <p>QUANTUM RESILIENCE ACTIVE</p>
                </div>
            </aside>

            <section id="chat-section">
                <div id="chat-conduit">
                    <div class="message ai greeting">
                        <div class="message-content">
                            Systemic initialization complete. I am the Election Process Assistant, anchored in the Hadron Core truth substrate. How may I facilitate your civic journey?
                        </div>
                    </div>
                </div>
                
                <footer id="input-anchor">
                    <form id="input-form">
                        <input type="text" id="user-query" placeholder="Ask about registration, verification, or polling..." autocomplete="off">
                        <button type="submit" id="transmit-btn">
                            <svg viewBox="0 0 24 24" width="24" height="24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/></svg>
                        </button>
                    </form>
                </footer>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
